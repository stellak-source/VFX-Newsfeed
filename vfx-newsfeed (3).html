<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>VFX INTEL — Industry Intelligence Feed</title>
<link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Syne:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0a0a0f;
    --surface: #111118;
    --surface2: #18181f;
    --border: #2a2a38;
    --accent: #00e5ff;
    --accent2: #ff3d71;
    --accent3: #ffe600;
    --text: #e8e8f0;
    --muted: #6b6b85;
    --tag-leader: #ff3d71;
    --tag-tax: #00e5ff;
    --tag-ai: #a855f7;
    --tag-closure: #ff6b35;
    --tag-venture: #22d3a5;
    --tag-market: #ffe600;
    --tag-other: #6b6b85;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  html, body {
    height: auto;
    min-height: 100%;
  }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Syne', sans-serif;
    overflow-x: hidden;
    /* No min-height: 100vh — lets iframe auto-size */
  }

  /* Grid background */
  body::before {
    content: '';
    position: absolute;
    inset: 0;
    min-height: 100%;
    background-image: 
      linear-gradient(rgba(0,229,255,0.03) 1px, transparent 1px),
      linear-gradient(90deg, rgba(0,229,255,0.03) 1px, transparent 1px);
    background-size: 40px 40px;
    pointer-events: none;
    z-index: 0;
  }

  /* Header — NOT sticky inside iframe (sticky only if standalone) */
  .header {
    position: relative;
    z-index: 100;
    background: rgba(10,10,15,0.97);
    border-bottom: 1px solid var(--border);
    padding: 0 1.5rem;
  }

  /* When embedded, sticky header causes scroll jank — use JS class to toggle */
  body.sticky-header .header {
    position: sticky;
    top: 0;
    backdrop-filter: blur(20px);
  }

  .header-inner {
    max-width: 100%;
    margin: 0 auto;
    display: flex;
    align-items: center;
    justify-content: space-between;
    height: 56px;
    gap: 1rem;
  }

  .logo {
    display: flex;
    align-items: baseline;
    gap: 0.5rem;
    flex-shrink: 0;
  }

  .logo-main {
    font-size: 1.3rem;
    font-weight: 800;
    letter-spacing: 0.15em;
    color: var(--text);
  }

  .logo-tag {
    font-family: 'Space Mono', monospace;
    font-size: 0.55rem;
    color: var(--accent);
    letter-spacing: 0.1em;
    text-transform: uppercase;
    border: 1px solid var(--accent);
    padding: 1px 5px;
    border-radius: 2px;
  }

  .header-right {
    display: flex;
    align-items: center;
    gap: 1.5rem;
  }

  .status-pill {
    display: flex;
    align-items: center;
    gap: 0.5rem;
    font-family: 'Space Mono', monospace;
    font-size: 0.65rem;
    color: var(--muted);
    letter-spacing: 0.08em;
  }

  .status-dot {
    width: 6px;
    height: 6px;
    border-radius: 50%;
    background: var(--accent3);
    animation: pulse-dot 2s ease-in-out infinite;
  }

  .status-dot.loading { background: var(--accent); }
  .status-dot.error { background: var(--accent2); animation: none; }

  @keyframes pulse-dot {
    0%, 100% { opacity: 1; transform: scale(1); }
    50% { opacity: 0.4; transform: scale(0.8); }
  }

  .refresh-btn {
    background: transparent;
    border: 1px solid var(--border);
    color: var(--muted);
    padding: 0.35rem 0.8rem;
    font-family: 'Space Mono', monospace;
    font-size: 0.65rem;
    letter-spacing: 0.08em;
    cursor: pointer;
    border-radius: 3px;
    transition: all 0.2s;
    text-transform: uppercase;
  }

  .refresh-btn:hover { border-color: var(--accent); color: var(--accent); }
  .refresh-btn:disabled { opacity: 0.4; cursor: not-allowed; }

  /* Filter bar */
  .filter-bar {
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    padding: 0.6rem 1.5rem;
    position: relative;
    z-index: 99;
  }

  .filter-inner {
    max-width: 100%;
    margin: 0 auto;
    display: flex;
    align-items: center;
    gap: 0.4rem;
    flex-wrap: wrap;
  }

  .filter-label {
    font-family: 'Space Mono', monospace;
    font-size: 0.6rem;
    color: var(--muted);
    letter-spacing: 0.1em;
    text-transform: uppercase;
    margin-right: 0.25rem;
  }

  .filter-chip {
    padding: 0.3rem 0.75rem;
    border-radius: 2px;
    font-family: 'Space Mono', monospace;
    font-size: 0.62rem;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    cursor: pointer;
    border: 1px solid transparent;
    transition: all 0.15s;
    background: var(--surface2);
    color: var(--muted);
    border-color: var(--border);
  }

  .filter-chip.active, .filter-chip:hover {
    color: var(--text);
    border-color: currentColor;
  }

  .filter-chip[data-cat="all"].active { color: var(--text); border-color: var(--text); }
  .filter-chip[data-cat="leadership"].active { color: var(--tag-leader); border-color: var(--tag-leader); }
  .filter-chip[data-cat="tax"].active { color: var(--tag-tax); border-color: var(--tag-tax); }
  .filter-chip[data-cat="ai"].active { color: var(--tag-ai); border-color: var(--tag-ai); }
  .filter-chip[data-cat="closure"].active { color: var(--tag-closure); border-color: var(--tag-closure); }
  .filter-chip[data-cat="venture"].active { color: var(--tag-venture); border-color: var(--tag-venture); }
  .filter-chip[data-cat="market"].active { color: var(--tag-market); border-color: var(--tag-market); }
  .filter-chip[data-cat="industry"].active { color: #a0a0c0; border-color: #a0a0c0; }

  /* Time filter chips */
  .time-chip.active { color: var(--accent3); border-color: var(--accent3); }

  /* Main layout */
  .main {
    max-width: 100%;
    margin: 0 auto;
    padding: 1.5rem;
    position: relative;
    z-index: 1;
  }

  /* Stats bar */
  .stats-bar {
    display: flex;
    align-items: center;
    gap: 2rem;
    margin-bottom: 2rem;
    padding-bottom: 1.5rem;
    border-bottom: 1px solid var(--border);
    flex-wrap: wrap;
  }

  .stat {
    display: flex;
    flex-direction: column;
    gap: 0.2rem;
  }

  .stat-num {
    font-size: 2rem;
    font-weight: 800;
    line-height: 1;
    color: var(--accent);
  }

  .stat-label {
    font-family: 'Space Mono', monospace;
    font-size: 0.58rem;
    color: var(--muted);
    letter-spacing: 0.1em;
    text-transform: uppercase;
  }

  .stat-divider {
    width: 1px;
    height: 40px;
    background: var(--border);
  }

  .next-refresh {
    margin-left: auto;
    font-family: 'Space Mono', monospace;
    font-size: 0.6rem;
    color: var(--muted);
    letter-spacing: 0.06em;
  }

  /* Articles grid */
  .articles-grid {
    display: grid;
    gap: 1px;
    background: var(--border);
    border: 1px solid var(--border);
  }

  /* Article card */
  .article-card {
    background: var(--surface);
    padding: 1.5rem;
    display: grid;
    grid-template-columns: auto 1fr auto;
    gap: 1.25rem;
    align-items: start;
    transition: background 0.15s;
    cursor: pointer;
    text-decoration: none;
    color: inherit;
  }

  .article-card:hover { background: var(--surface2); }

  .article-index {
    font-family: 'Space Mono', monospace;
    font-size: 0.65rem;
    color: var(--muted);
    padding-top: 0.15rem;
    min-width: 24px;
    text-align: right;
  }

  .article-body { min-width: 0; }

  .article-meta {
    display: flex;
    align-items: center;
    gap: 0.75rem;
    margin-bottom: 0.5rem;
    flex-wrap: wrap;
  }

  .tag {
    font-family: 'Space Mono', monospace;
    font-size: 0.58rem;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    padding: 0.15rem 0.5rem;
    border-radius: 2px;
    font-weight: 700;
    flex-shrink: 0;
  }

  .tag-leadership { background: rgba(255,61,113,0.15); color: var(--tag-leader); }
  .tag-tax { background: rgba(0,229,255,0.1); color: var(--tag-tax); }
  .tag-ai { background: rgba(168,85,247,0.15); color: var(--tag-ai); }
  .tag-closure { background: rgba(255,107,53,0.15); color: var(--tag-closure); }
  .tag-venture { background: rgba(34,211,165,0.15); color: var(--tag-venture); }
  .tag-market { background: rgba(255,230,0,0.1); color: var(--tag-market); }
  .tag-industry { background: rgba(107,107,133,0.15); color: #a0a0c0; }
  .tag-other { background: rgba(107,107,133,0.15); color: var(--tag-other); }

  .source-name {
    font-family: 'Space Mono', monospace;
    font-size: 0.6rem;
    color: var(--muted);
    letter-spacing: 0.06em;
    text-transform: uppercase;
  }

  .pub-date {
    font-family: 'Space Mono', monospace;
    font-size: 0.6rem;
    color: var(--muted);
  }

  .article-title {
    font-size: 1rem;
    font-weight: 600;
    line-height: 1.4;
    color: var(--text);
    margin-bottom: 0.5rem;
    transition: color 0.15s;
  }

  .article-card:hover .article-title { color: var(--accent); }

  .article-summary {
    font-size: 0.82rem;
    color: var(--muted);
    line-height: 1.6;
    display: -webkit-box;
    -webkit-line-clamp: 2;
    -webkit-box-orient: vertical;
    overflow: hidden;
  }

  .article-arrow {
    color: var(--border);
    font-size: 1rem;
    padding-top: 0.15rem;
    transition: color 0.15s, transform 0.15s;
    flex-shrink: 0;
  }

  .article-card:hover .article-arrow {
    color: var(--accent);
    transform: translateX(3px);
  }

  /* Loading state */
  .loading-state {
    padding: 5rem 2rem;
    text-align: center;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 1.5rem;
  }

  .loading-spinner {
    width: 48px;
    height: 48px;
    border: 2px solid var(--border);
    border-top-color: var(--accent);
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
  }

  @keyframes spin { to { transform: rotate(360deg); } }

  .loading-text {
    font-family: 'Space Mono', monospace;
    font-size: 0.7rem;
    color: var(--muted);
    letter-spacing: 0.1em;
    text-transform: uppercase;
  }

  .loading-subtext {
    font-size: 0.8rem;
    color: var(--muted);
    max-width: 400px;
    line-height: 1.6;
  }

  /* Error state */
  .error-state {
    padding: 4rem 2rem;
    text-align: center;
  }

  .error-code {
    font-family: 'Space Mono', monospace;
    font-size: 3rem;
    font-weight: 700;
    color: var(--accent2);
    margin-bottom: 0.5rem;
  }

  .error-msg {
    color: var(--muted);
    margin-bottom: 1.5rem;
  }

  /* Empty state */
  .empty-state {
    padding: 4rem 2rem;
    text-align: center;
  }

  .empty-icon {
    font-size: 3rem;
    margin-bottom: 1rem;
    opacity: 0.4;
  }

  .empty-msg {
    font-size: 0.9rem;
    color: var(--muted);
  }

  /* Progress bar */
  .progress-bar {
    height: 2px;
    background: var(--border);
    overflow: hidden;
  }

  .progress-fill {
    height: 100%;
    background: linear-gradient(90deg, var(--accent), var(--accent2));
    width: 0%;
    transition: width 0.3s ease;
  }

  /* Category breakdown */
  .category-bar {
    display: flex;
    gap: 0.25rem;
    height: 3px;
    margin-bottom: 2rem;
    border-radius: 2px;
    overflow: hidden;
  }

  .cat-segment {
    border-radius: 2px;
    transition: flex 0.5s ease;
  }

  .hidden { display: none !important; }

  /* Scrollbar */
  ::-webkit-scrollbar { width: 6px; }
  ::-webkit-scrollbar-track { background: var(--bg); }
  ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }

  @media (max-width: 600px) {
    .header-inner { height: auto; padding: 0.75rem 0; flex-wrap: wrap; }
    .article-card { grid-template-columns: 1fr; }
    .article-index, .article-arrow { display: none; }
    .stats-bar { gap: 1rem; }
    .stat-num { font-size: 1.4rem; }
  }
</style>
</head>
<body>

<header class="header">
  <div class="header-inner">
    <div class="logo">
      <span class="logo-main">VFX INTEL</span>
      <span class="logo-tag">Industry Feed</span>
    </div>
    <div class="header-right">
      <div class="status-pill">
        <div class="status-dot" id="statusDot"></div>
        <span id="statusText">INITIALIZING</span>
      </div>
      <button class="refresh-btn" id="refreshBtn" onclick="fetchNews()">↻ REFRESH</button>
    </div>
  </div>
  <div class="progress-bar"><div class="progress-fill" id="progressFill"></div></div>
</header>

<div class="filter-bar">
  <div class="filter-inner">
    <span class="filter-label">Topic:</span>
    <button class="filter-chip active" data-cat="all" onclick="setFilter('all')">All</button>
    <button class="filter-chip" data-cat="leadership" onclick="setFilter('leadership')">Leadership</button>
    <button class="filter-chip" data-cat="tax" onclick="setFilter('tax')">Tax & Incentives</button>
    <button class="filter-chip" data-cat="ai" onclick="setFilter('ai')">AI & Tech</button>
    <button class="filter-chip" data-cat="venture" onclick="setFilter('venture')">New Ventures</button>
    <button class="filter-chip" data-cat="closure" onclick="setFilter('closure')">Closures</button>
    <button class="filter-chip" data-cat="market" onclick="setFilter('market')">Market Intel</button>
    <button class="filter-chip" data-cat="industry" onclick="setFilter('industry')">Industry</button>
  </div>
  <div class="filter-inner" style="margin-top:0.4rem; padding-top:0.4rem; border-top:1px solid var(--border);">
    <span class="filter-label">Period:</span>
    <button class="filter-chip time-chip" data-time="week" onclick="setTime('week')">This Week</button>
    <button class="filter-chip time-chip" data-time="month" onclick="setTime('month')">This Month</button>
    <button class="filter-chip time-chip active" data-time="quarter" onclick="setTime('quarter')">3 Months</button>
  </div>
</div>

<main class="main">
  <div class="stats-bar" id="statsBar" style="display:none">
    <div class="stat">
      <div class="stat-num" id="statTotal">0</div>
      <div class="stat-label">Stories</div>
    </div>
    <div class="stat-divider"></div>
    <div class="stat">
      <div class="stat-num" id="statSources">0</div>
      <div class="stat-label">Sources</div>
    </div>
    <div class="stat-divider"></div>
    <div class="stat">
      <div class="stat-num" id="statFiltered">0</div>
      <div class="stat-label">Filtered Out</div>
    </div>
    <div class="next-refresh" id="nextRefresh"></div>
  </div>

  <div class="category-bar" id="categoryBar"></div>

  <div id="feedContainer">
    <div class="loading-state">
      <div class="loading-spinner"></div>
      <div class="loading-text">Scanning Industry Sources + Google News</div>
      <div class="loading-subtext">Fetching VFX news and filtering for leadership changes, incentives, AI, market intelligence, and business developments...</div>
    </div>
  </div>
</main>

<script>
const PROXY_URLS = [
  'https://api.allorigins.win/get?url=',
  'https://corsproxy.io/?'
];

// Google News RSS — targeted search queries for VFX industry intelligence
const GOOGLE_NEWS_QUERIES = [
  // Broad catch-all — matches the "vfx" Google News search directly
  'vfx',
  'visual effects',
  'VFX studio',
  'VFX industry',

  // Business intelligence
  'VFX studio acquisition merger',
  'VFX company layoffs redundancies',
  'VFX studio closes bankruptcy',
  'VFX company funding investment',
  'VFX executive appointed CEO hired',
  'animation studio acquisition merger',
  'post production company news',

  // Policy & incentives
  'VFX tax incentive rebate film',
  'film production incentive subsidy government',
  'film tax credit rebate legislation',

  // Technology
  'visual effects AI artificial intelligence',
  'virtual production LED volume studio',
  'generative AI film production Hollywood',

  // Labor
  'visual effects union IATSE strike',
  'VFX industry market report',
  'visual effects society VES',

  // Major vendors — catches news not tagged "VFX"
  'Weta FX news',
  'ILM Industrial Light Magic news',
  'DNEG news',
  'Framestore news',
  'Scanline VFX news',
  'Digital Domain news',
  'Cinesite news',
  'Rodeo FX news',
  'Ghost VFX news',
  'Jellyfish Pictures news',
  'Milk VFX news',
];

function buildGoogleNewsFeeds() {
  return GOOGLE_NEWS_QUERIES.map(q => ({
    url: `https://news.google.com/rss/search?q=${encodeURIComponent(q)}&hl=en-US&gl=US&ceid=US:en`,
    name: 'Google News',
    isGoogle: true,
    broadCatch: true  // use looser category matching for search-targeted feeds
  }));
}

const RSS_FEEDS = [
  // ── Dedicated VFX / animation sources (no filter needed — already VFX-focused) ──
  { url: 'https://www.vfxvoice.com/feed/', name: 'VFX Voice' },
  { url: 'https://www.cgchannel.com/feed/', name: 'CG Channel' },
  { url: 'https://beforesandafters.com/feed/', name: 'Befores & Afters' },
  { url: 'https://www.fxguide.com/feed/', name: 'FXGuide' },
  { url: 'https://www.awn.com/rss.xml', name: 'AWN' },
  { url: 'https://awn.com/vfxworld/feed', name: 'AWN VFX World' },
  { url: 'https://motionographer.com/feed/atom', name: 'Motionographer' },
  { url: 'https://artofvfx.com/feed', name: 'Art of VFX' },
  { url: 'https://stashmedia.tv/feed', name: 'Stash Media' },
  { url: 'https://www.cartoonbrew.com/feed/', name: 'Cartoon Brew' },
  { url: 'https://www.animationmagazine.net/feed/', name: 'Animation Magazine' },

  // ── Deadline ────────────────────────────────────────────────────────────
  { url: 'https://deadline.com/feed/', name: 'Deadline', vfxFilter: true },
  { url: 'https://deadline.com/v/film/feed/', name: 'Deadline Film', vfxFilter: true },
  { url: 'https://deadline.com/v/business/feed/', name: 'Deadline Biz', vfxFilter: true },
  { url: 'https://deadline.com/v/international/feed/', name: 'Deadline Intl', vfxFilter: true },
  { url: 'https://deadline.com/v/tv/feed/', name: 'Deadline TV', vfxFilter: true },
  { url: 'https://deadline.com/category/vfx/feed/', name: 'Deadline VFX' },
  { url: 'https://deadline.com/tag/visual-effects/feed/', name: 'Deadline VFX Tag' },
  { url: 'https://deadline.com/tag/visual-effects-and-screen/feed/', name: 'Deadline VFX+Screen' },
  { url: 'https://deadline.com/category/executives/feed/', name: 'Deadline Execs', vfxFilter: true },
  { url: 'https://deadline.com/category/legal/feed/', name: 'Deadline Legal', vfxFilter: true },
  { url: 'https://deadline.com/tag/layoffs/feed/', name: 'Deadline Layoffs', vfxFilter: true },
  { url: 'https://deadline.com/tag/artificial-intelligence/feed/', name: 'Deadline AI', vfxFilter: true },

  // ── Variety ─────────────────────────────────────────────────────────────
  { url: 'https://variety.com/v/film/vfx/feed/', name: 'Variety VFX' },
  { url: 'https://variety.com/v/film/feed/', name: 'Variety Film', vfxFilter: true },
  { url: 'https://variety.com/v/business/feed/', name: 'Variety Biz', vfxFilter: true },
  { url: 'https://variety.com/v/digital/feed/', name: 'Variety Digital', vfxFilter: true },
  { url: 'https://variety.com/v/tv/feed/', name: 'Variety TV', vfxFilter: true },
  { url: 'https://variety.com/tag/animation/feed/', name: 'Variety Animation', vfxFilter: true },
  { url: 'https://variety.com/tag/layoffs/feed/', name: 'Variety Layoffs', vfxFilter: true },
  { url: 'https://variety.com/tag/artificial-intelligence/feed/', name: 'Variety AI', vfxFilter: true },

  // ── The Hollywood Reporter ───────────────────────────────────────────────
  { url: 'https://www.hollywoodreporter.com/c/movies/vfx/feed/', name: 'THR VFX' },
  { url: 'https://www.hollywoodreporter.com/c/business/feed/', name: 'THR Biz', vfxFilter: true },
  { url: 'https://www.hollywoodreporter.com/c/movies/feed/', name: 'THR Movies', vfxFilter: true },
  { url: 'https://www.hollywoodreporter.com/c/tv/feed/', name: 'THR TV', vfxFilter: true },
  { url: 'https://www.hollywoodreporter.com/t/animation/feed/', name: 'THR Animation', vfxFilter: true },
  { url: 'https://www.hollywoodreporter.com/t/technology/feed/', name: 'THR Tech', vfxFilter: true },

  // ── Cartoon Brew (all sections) ──────────────────────────────────────────
  { url: 'https://www.cartoonbrew.com/category/business/feed/', name: 'Cartoon Brew Biz' },
  { url: 'https://www.cartoonbrew.com/category/technology/feed/', name: 'Cartoon Brew Tech' },
  { url: 'https://www.cartoonbrew.com/category/vfx/feed/', name: 'Cartoon Brew VFX' },

  // ── Animation Magazine (all sections) ───────────────────────────────────
  { url: 'https://www.animationmagazine.net/category/business/feed/', name: 'AnimMag Biz' },
  { url: 'https://www.animationmagazine.net/category/vfx/feed/', name: 'AnimMag VFX' },
  { url: 'https://www.animationmagazine.net/category/technology/feed/', name: 'AnimMag Tech' },

  // ── IndieWire ───────────────────────────────────────────────────────────
  { url: 'https://www.indiewire.com/feed/', name: 'IndieWire', vfxFilter: true },
  { url: 'https://www.indiewire.com/c/film/feed/', name: 'IndieWire Film', vfxFilter: true },
  { url: 'https://www.indiewire.com/c/business/feed/', name: 'IndieWire Biz', vfxFilter: true },

  // ── Blooloop / Theme Park / Location-Based ───────────────────────────────
  { url: 'https://blooloop.com/feed/', name: 'Blooloop', vfxFilter: true },

  // ── TechCrunch / The Verge / Wired (AI & tech angle) ────────────────────
  { url: 'https://techcrunch.com/feed/', name: 'TechCrunch', vfxFilter: true },
  { url: 'https://www.theverge.com/rss/index.xml', name: 'The Verge', vfxFilter: true },
  { url: 'https://www.wired.com/feed/rss', name: 'Wired', vfxFilter: true },

  // ── Screen International / Screendaily ──────────────────────────────────
  { url: 'https://www.screendaily.com/rss', name: 'Screen Daily', vfxFilter: true },

  // ── Google News targeted queries ─────────────────────────────────────────
  ...buildGoogleNewsFeeds()
];

// Keywords for broad-feed VFX filtering — studio names, roles, business terms
const VFX_BROAD_KEYWORDS = [
  // Generic terms
  'vfx', 'visual effects', 'visual effect', 'cgi', 'animation studio',
  'motion capture', 'mocap', 'compositing', 'post production', 'postproduction',
  'rendering', 'previs', 'previsualization', 'virtual production', 'led volume',
  'stagecraft', 'vfx supervisor', 'vfx producer', 'vfx artist',

  // Major studios / vendors
  'weta digital', 'weta fx', 'wetafx', 'industrial light', 'ilm',
  'dneg', 'double negative', 'framestore', 'method studios', 'rising sun pictures',
  'pixar', 'dreamworks animation', 'sony pictures imageworks', 'imageworks',
  'mpc film', 'mill film', 'cinesite', 'scanline vfx', 'rhythm & hues',
  'digital domain', 'blur studio', 'animal logic', 'image engine',
  'rodeo fx', 'luma pictures', 'raynault vfx', 'streamline media',
  'invisible vfx', 'outpost vfx', 'goodbye kansas', 'axis studios',
  'jellyfish pictures', 'jellyfish vfx', 'one of us', 'milk vfx',
  'moving picture company', 'base fx', 'baked fx', 'crafty apes',
  'encore vfx', 'berkeleysvfx', 'zero vfx', 'ghost vfx', 'nviz',
  'magnopus', 'technicolor vfx', 'mikros', 'illumination', 'laika',
  'sony animation', 'netflix animation', 'disney animation', 'disney vfx',
  'marvel studios vfx', 'marvel vfx', 'lucasfilm', 'netflix vfx',

  // Business / policy terms tied to VFX
  'production incentive', 'film incentive', 'tax credit', 'tax rebate',
  'film commission', 'screen incentive', 'content incentive',
  'unreal engine', 'virtual studio', 'ai-generated film', 'generative ai film',
  'iatse', 'vga ', 'visual effects society', 'ves '
];

let allArticles = [];
let activeFilter = 'all';
let activeTime = 'quarter';
let countdownInterval = null;
let filteredCount = 0;

// Hard cutoff — never show anything older than 3 months
const HARD_CUTOFF = new Date(Date.now() - 91 * 86400000);

// Category detection
function detectCategory(title, description, broadCatch = false) {
  const text = (title + ' ' + description).toLowerCase();
  
  const patterns = {
    leadership: [
      'ceo', 'cfo', 'cto', 'coo', 'president', 'vp ', 'vice president',
      'appointed', 'hired', 'joins', 'promoted', 'leaves', 'departs', 'resigned',
      'fired', 'layoff', 'layoffs', 'laid off', 'redundancies', 'headcount', 'cuts jobs',
      'executive', 'leadership', 'management', 'founder', 'co-founder',
      'steps down', 'named as', 'new head', 'new chief', 'takes over', 'succeeds'
    ],
    tax: [
      'tax credit', 'tax incentive', 'rebate', 'subsidy', 'grant',
      'incentive', 'government support', 'production incentive', 'film commission',
      'tax relief', 'vfx rebate', 'screen incentive', 'location incentive',
      'filming incentive', 'tax break', 'offset', 'state fund', 'uk tax',
      'screen australia', 'british film', 'canada media fund', 'creative europe'
    ],
    ai: [
      'artificial intelligence', ' ai ', 'machine learning', 'generative ai',
      'gen ai', 'neural', 'diffusion model', 'sora', 'midjourney', 'stable diffusion',
      'automation', 'deep learning', 'gpt', 'llm', 'deepfake', 'synthetic media',
      'ai-generated', 'ai tool', 'real-time rendering', 'autonomous',
      'openai', 'google deepmind', 'runway ml', 'pika', 'kling', 'luma ai',
      'ai workflow', 'ai pipeline', 'neural rendering', 'nerf', 'gaussian splatting'
    ],
    closure: [
      'shutdown', 'closes', 'closed', 'bankrupt', 'insolvency', 'administration',
      'wind down', 'ceases', 'liquidat', 'chapter 11', 'chapter 7',
      'goes under', 'shut down', 'folds', 'acqui', 'merged', 'takeover',
      'bought out', 'acquired', 'absorbed', 'dissolved', 'ceasing operations'
    ],
    venture: [
      'launch', 'new studio', 'expands', 'expansion', 'opens', 'new office',
      'funding', 'investment', 'series a', 'series b', 'series c', 'venture capital',
      'raises', 'backed', 'spin-off', 'spinoff', 'new division', 'new branch',
      'partnership', 'joint venture', 'founded', 'startup', 'new facility',
      'new pipeline', 'new technology', 'new tool', 'new platform', 'new service',
      'deal with', 'signs with', 'teams with', 'collaborates with'
    ],
    market: [
      'revenue', 'profit', 'loss', 'earnings', 'market share', 'ipo',
      'valuation', 'quarterly', 'annual report', 'forecast', 'outlook',
      'industry report', 'box office', 'streaming', 'union', 'strike',
      'wage', 'contract', 'iatse', 'vga', 'guild', 'residual',
      'deal', 'rights', 'intellectual property', 'patent',
      'regulation', 'legislation', 'policy', 'survey', 'study',
      'market size', 'growth', 'decline', 'demand', 'production spend'
    ],
    // Catch-all for general VFX industry news from targeted Google News searches
    industry: broadCatch ? [
      'vfx', 'visual effects', 'cgi', 'animation', 'post production',
      'weta', 'ilm', 'dneg', 'framestore', 'scanline', 'digital domain',
      'cinesite', 'rodeo', 'ghost vfx', 'jellyfish', 'milk vfx',
      'virtual production', 'oscar', 'emmy', 'ves award', 'award'
    ] : []
  };

  for (const [cat, keywords] of Object.entries(patterns)) {
    if (keywords.length === 0) continue;
    for (const kw of keywords) {
      if (text.includes(kw)) return cat;
    }
  }
  return null;
}

// Check if article is substantive industry news (not a showcase/reel)
function isSubstantiveNews(title, description) {
  const text = (title + ' ' + description).toLowerCase();
  
  // Reject patterns - vendor showcases, tutorials, reels
  const rejectPatterns = [
    'breakdown', 'behind the scenes', 'tutorial', 'reel', 'showreel',
    'demo reel', 'making of', 'how we made', 'vfx breakdown', 'animation breakdown',
    'fx breakdown', 'shot breakdown', 'visual breakdown', 'behind-the-scenes',
    'step by step', 'plugin review', 'software review', 'workflow tip',
    'interview with artist', 'artist spotlight', 'gallery', 'showcase',
    'render gallery', 'artwork of the', 'artist of the', 'image of the day',
    'picture of the day', 'video of the day', 'weekly picks', 'inspiration',
    'wow factor', 'impressive work', 'stunning', 'beautiful cgi'
  ];

  const hasReject = rejectPatterns.some(p => text.includes(p));
  if (hasReject) return false;

  return detectCategory(title, description) !== null;
}

async function fetchRSSFeed(feed, proxyIndex = 0) {
  if (proxyIndex >= PROXY_URLS.length) return [];
  
  const proxy = PROXY_URLS[proxyIndex];
  const fetchUrl = proxy.includes('allorigins')
    ? proxy + encodeURIComponent(feed.url)
    : proxy + encodeURIComponent(feed.url);

  try {
    const res = await fetch(fetchUrl, { signal: AbortSignal.timeout(6000) }); // 6s timeout (was 10s)
    if (!res.ok) throw new Error('Bad response');
    
    let xmlText;
    if (proxy.includes('allorigins')) {
      const json = await res.json();
      xmlText = json.contents;
    } else {
      xmlText = await res.text();
    }
    
    const parser = new DOMParser();
    const doc = parser.parseFromString(xmlText, 'text/xml');
    const items = doc.querySelectorAll('item');
    
    const articles = [];
    items.forEach(item => {
      const title = item.querySelector('title')?.textContent?.trim() || '';
      const link = item.querySelector('link')?.textContent?.trim() || '';
      const pubDate = item.querySelector('pubDate')?.textContent?.trim() || '';
      const desc = item.querySelector('description')?.textContent?.replace(/<[^>]*>/g, '').trim() || '';
      const content = item.querySelector('encoded')?.textContent?.replace(/<[^>]*>/g, '').trim() || '';
      
      if (!title || !link) return;

      // Parse and hard-cut at 3 months — skip undated articles
      let date = null;
      try { date = new Date(pubDate); } catch(e) {}
      if (!date || isNaN(date) || date < HARD_CUTOFF) return;

      const fullText = (title + ' ' + (desc || content)).toLowerCase();

      // For broad feeds require a VFX keyword
      if (feed.vfxFilter) {
        const hasVFX = VFX_BROAD_KEYWORDS.some(kw => fullText.includes(kw));
        if (!hasVFX) return;
      }
      
      const category = detectCategory(title, desc || content, feed.broadCatch || false);
      if (!category) return;

      // Only apply the showcase/reel rejection filter on non-broadCatch feeds
      if (!feed.broadCatch && !isSubstantiveNews(title, desc || content)) return;
      
      articles.push({
        title,
        link,
        date,
        description: (desc || content).substring(0, 300),
        source: feed.name,
        category
      });
    });
    
    return articles;
  } catch(e) {
    if (proxyIndex + 1 < PROXY_URLS.length) {
      return fetchRSSFeed(feed, proxyIndex + 1);
    }
    return [];
  }
}

function formatDate(date) {
  if (!date || isNaN(date)) return '—';
  const now = new Date();
  const diff = now - date;
  const hours = Math.floor(diff / 3600000);
  const days = Math.floor(diff / 86400000);
  
  if (diff < 3600000) return `${Math.floor(diff / 60000)}m ago`;
  if (hours < 24) return `${hours}h ago`;
  if (days < 7) return `${days}d ago`;
  return date.toLocaleDateString('en-US', { month: 'short', day: 'numeric' });
}

function getCategoryLabel(cat) {
  const labels = {
    leadership: 'Leadership',
    tax: 'Incentives',
    ai: 'AI & Tech',
    closure: 'Closure',
    venture: 'New Venture',
    market: 'Market Intel',
    industry: 'Industry'
  };
  return labels[cat] || cat;
}

function setProgress(pct) {
  document.getElementById('progressFill').style.width = pct + '%';
}

function setStatus(state, text) {
  const dot = document.getElementById('statusDot');
  dot.className = 'status-dot' + (state !== 'live' ? ' ' + state : '');
  document.getElementById('statusText').textContent = text;
}

function renderCategoryBar(articles) {
  const cats = {};
  articles.forEach(a => { cats[a.category] = (cats[a.category]||0) + 1; });
  const total = articles.length;
  const colors = { leadership: '#ff3d71', tax: '#00e5ff', ai: '#a855f7', closure: '#ff6b35', venture: '#22d3a5', market: '#ffe600', industry: '#a0a0c0' };
  
  const bar = document.getElementById('categoryBar');
  bar.innerHTML = Object.entries(cats).map(([cat, count]) => 
    `<div class="cat-segment" style="flex:${count};background:${colors[cat]||'#6b6b85'};opacity:0.7;min-width:4px" title="${getCategoryLabel(cat)}: ${count}"></div>`
  ).join('');
}

function getTimeCutoff(period) {
  const now = new Date();
  if (period === 'week')  return new Date(now - 7 * 86400000);
  if (period === 'month') return new Date(now - 30 * 86400000);
  return HARD_CUTOFF; // 'quarter' or anything else = 3 months max
}

function renderFeed(articles) {
  const container = document.getElementById('feedContainer');
  const cutoff = getTimeCutoff(activeTime);

  let filtered = articles;

  // Apply topic filter
  if (activeFilter !== 'all') {
    filtered = filtered.filter(a => a.category === activeFilter);
  }

  // Apply time filter
  if (cutoff) {
    filtered = filtered.filter(a => a.date && a.date >= cutoff);
  }

  if (filtered.length === 0) {
    const timeLbl = activeTime === 'all' ? '' : { week: 'in the past week', month: 'in the past month', quarter: 'in the past quarter' }[activeTime];
    container.innerHTML = `
      <div class="empty-state">
        <div class="empty-icon">◎</div>
        <div class="empty-msg">No ${activeFilter !== 'all' ? getCategoryLabel(activeFilter) + ' ' : ''}stories found ${timeLbl}.</div>
      </div>`;
    return;
  }

  // Always sort newest first
  const sorted = [...filtered].sort((a, b) => b.date - a.date);

  container.innerHTML = `<div class="articles-grid">${sorted.map((art, i) => `
    <a class="article-card" href="${art.link}" target="_blank" rel="noopener">
      <div class="article-index">${String(i+1).padStart(2,'0')}</div>
      <div class="article-body">
        <div class="article-meta">
          <span class="tag tag-${art.category}">${getCategoryLabel(art.category)}</span>
          <span class="source-name">${art.source}</span>
          <span class="pub-date">${formatDate(art.date)}</span>
        </div>
        <div class="article-title">${art.title}</div>
        ${art.description ? `<div class="article-summary">${art.description}</div>` : ''}
      </div>
      <div class="article-arrow">→</div>
    </a>`).join('')}</div>`;
}

function updateStats(articles, totalRejected) {
  const sources = new Set(articles.map(a => a.source)).size;
  document.getElementById('statTotal').textContent = articles.length;
  document.getElementById('statSources').textContent = sources;
  document.getElementById('statFiltered').textContent = totalRejected;
  document.getElementById('statsBar').style.display = 'flex';
  renderCategoryBar(articles);
}

function startCountdown(minutes = 60) {
  if (countdownInterval) clearInterval(countdownInterval);
  let secs = minutes * 60;
  function tick() {
    const m = Math.floor(secs / 60);
    const s = secs % 60;
    document.getElementById('nextRefresh').textContent = 
      `Next refresh in ${m}:${String(s).padStart(2,'0')}`;
    if (secs <= 0) { clearInterval(countdownInterval); fetchNews(); }
    secs--;
  }
  tick();
  countdownInterval = setInterval(tick, 1000);
}

async function fetchNews() {
  setStatus('loading', 'FETCHING...');
  document.getElementById('refreshBtn').disabled = true;
  setProgress(5);
  filteredCount = 0;
  allArticles = [];

  document.getElementById('feedContainer').innerHTML = `
    <div class="loading-state">
      <div class="loading-spinner"></div>
      <div class="loading-text" id="loadingText">Connecting to sources...</div>
      <div class="loading-subtext">Filtering for leadership changes, incentives, AI developments, market intelligence, and business news...</div>
    </div>`;

  const BATCH_SIZE = 10; // fetch 10 feeds simultaneously
  const results = [];
  let completed = 0;
  const total = RSS_FEEDS.length;

  // Split into batches and fetch in parallel
  for (let i = 0; i < total; i += BATCH_SIZE) {
    const batch = RSS_FEEDS.slice(i, i + BATCH_SIZE);

    const batchResults = await Promise.allSettled(
      batch.map(feed => fetchRSSFeed(feed))
    );

    batchResults.forEach(r => {
      if (r.status === 'fulfilled') results.push(...r.value);
    });

    completed += batch.length;
    const pct = 5 + (completed / total) * 80;
    setProgress(pct);

    // Deduplicate and show results progressively after each batch
    const seen = new Set();
    const unique = results.filter(a => {
      const key = a.title.toLowerCase().replace(/[^a-z0-9]/g, '').substring(0, 50);
      if (seen.has(key)) return false;
      seen.add(key);
      return true;
    });

    if (unique.length > 0) {
      allArticles = unique;
      const loadingText = document.getElementById('loadingText');
      if (loadingText) loadingText.textContent = `Found ${unique.length} stories so far... (${completed}/${total} sources)`;

      // After first batch with results, swap loading state for live feed
      if (completed >= BATCH_SIZE && document.getElementById('loadingText') === null || unique.length > 3) {
        updateStats(allArticles, 0);
        renderFeed(allArticles);
        setStatus('loading', `LOADING — ${unique.length} SO FAR`);
      }
    }
  }

  setProgress(100);
  setTimeout(() => setProgress(0), 600);

  // Final dedup pass
  const seen = new Set();
  const unique = results.filter(a => {
    const key = a.title.toLowerCase().replace(/[^a-z0-9]/g, '').substring(0, 50);
    if (seen.has(key)) return false;
    seen.add(key);
    return true;
  });

  allArticles = unique;

  if (allArticles.length === 0) {
    document.getElementById('feedContainer').innerHTML = `
      <div class="error-state">
        <div class="error-code">⚠</div>
        <div class="error-msg">Could not retrieve feeds. This may be a network or CORS issue. Try refreshing.</div>
      </div>`;
    setStatus('error', 'FETCH FAILED');
  } else {
    updateStats(allArticles, 0);
    renderFeed(allArticles);
    setStatus('live', `LIVE — ${allArticles.length} STORIES`);
    startCountdown(60);
  }

  document.getElementById('refreshBtn').disabled = false;
}

function setFilter(cat) {
  activeFilter = cat;
  document.querySelectorAll('.filter-chip[data-cat]').forEach(c => {
    c.classList.toggle('active', c.dataset.cat === cat);
  });
  renderFeed(allArticles);
}

function setTime(period) {
  activeTime = period;
  document.querySelectorAll('.time-chip').forEach(c => {
    c.classList.toggle('active', c.dataset.time === period);
  });
  renderFeed(allArticles);
}

// Init
fetchNews();

// ── Squarespace / iframe embed support ──────────────────────────────────────
// Detect if running inside an iframe
const isEmbedded = (() => {
  try { return window.self !== window.top; } catch(e) { return true; }
})();

if (!isEmbedded) {
  // Standalone view: enable sticky header
  document.body.classList.add('sticky-header');
}

// iframe-resizer: post height to parent so Squarespace can auto-size the iframe
function postHeight() {
  const h = document.documentElement.scrollHeight;
  try {
    window.parent.postMessage({ type: 'vfxintel-height', height: h }, '*');
  } catch(e) {}
}

// Also support iFrameResizer library if Squarespace uses it
if (window.parentIFrame) {
  window.parentIFrame.autoResize(true);
}

// Watch for DOM changes and resize
const resizeObserver = new ResizeObserver(() => postHeight());
resizeObserver.observe(document.body);
window.addEventListener('load', postHeight);
</script>
